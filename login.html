<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GhostGuard - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body {
      background: radial-gradient(circle at top, #0c2448, #020617 70%);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      padding: 20px;
    }
    body::before {
      content: "";
      position: fixed;
      width: 100%;
      height: 100%;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: -1;
      pointer-events: none;
    }
    .login-card {
      background: rgba(2, 6, 23, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 20px 60px -10px rgba(0,0,0,0.7);
      text-align: center;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 28px;
      font-weight: 800;
      color: #bcd6ff;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .logo-dot {
      width: 14px; height: 14px;
      background: #3b82f6;
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(59,130,246,0.6);
    }
    .subtitle {
      color: #7f96c0;
      font-size: 15px;
      margin-bottom: 36px;
    }
    .discord-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 16px 24px;
      background: #5865F2;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }
    .discord-btn:hover {
      background: #4752c4;
      transform: translateY(-2px);
      box-shadow: 0 10px 30px -5px rgba(88,101,242,0.5);
    }
    .discord-icon {
      width: 24px;
      height: 24px;
      fill: white;
    }
    .info {
      margin-top: 32px;
      padding: 18px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      font-size: 13px;
      color: #9fb3d9;
      line-height: 1.6;
    }
    .info strong { color: #e0edff; }
    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: #5f7191;
    }
    .footer a {
      color: #60a5fa;
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <span class="logo-dot"></span>
      GhostGuard
    </div>
    <div class="subtitle">Logga in för att hantera din anticheat</div>

    <a href="/auth/discord" class="discord-btn">
      <svg class="discord-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
      </svg>
      Logga in med Discord
    </a>

    <div class="info">
      Du loggar in med ditt <strong>Discord-konto</strong>. Om du har en plan tas du till din panel. Om inte, visas instruktioner för hur du köper en.
    </div>

    <div class="footer">
      Tillbaka till <a href="https://ghostguardac.se">ghostguardac.se</a>
    </div>
  </div>
</body>
</html>
